<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site editor — Thowdan Al-Eryani</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0A0B0F" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preload" href="/css/styles.css" as="style">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"></noscript>
  <script>
    (function () {
      try {
        var s = localStorage.getItem('pf-theme');
        var d = s ? s === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
</head>
<body>
  <div class="bg-base" aria-hidden="true"></div>
  <div class="glow-field" aria-hidden="true">
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
  </div>

  <div class="admin-wrap">
    <div class="admin-topbar">
      <div>
        <h1 class="admin-title">Site editor</h1>
        <p class="admin-sub">Edit your portfolio content. Changes go live as soon as you save.</p>
      </div>
      <div class="btn-row">
        <a class="btn-soft" href="/" target="_blank" rel="noopener"><i class="fa-solid fa-arrow-up-right-from-square"></i>&nbsp;View site</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
          <i class="fa-solid fa-moon icon-moon"></i>
          <i class="fa-solid fa-sun icon-sun"></i>
        </button>
      </div>
    </div>

    <!-- Login view -->
    <div id="login" class="admin-card admin-login hidden">
      <h2>Log in</h2>
      <div id="login-notice"></div>
      <form id="login-form">
        <div class="field">
          <label for="password">Admin password</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <div class="btn-row">
          <button class="btn btn-accent btn-sm" type="submit">Log in</button>
          <span id="login-status" class="admin-status"></span>
        </div>
      </form>
    </div>

    <!-- Editor view -->
    <div id="editor" class="hidden">
      <div id="editor-notice"></div>
      <div id="form"></div>
      <div class="admin-bar">
        <span id="save-status" class="admin-status">Loaded.</span>
        <div class="btn-row">
          <button class="btn-soft" type="button" id="discard">Discard changes</button>
          <button class="btn-soft btn-danger" type="button" id="logout">Log out</button>
          <button class="btn btn-accent btn-sm" type="button" id="save">Save &amp; publish</button>
        </div>
      </div>
    </div>

    <div id="boot" class="admin-card"><span class="admin-status">Loading…</span></div>
  </div>

  <script src="/js/theme.js" defer></script>
  <script src="/js/admin.js" defer></script>
</body>
</html>
