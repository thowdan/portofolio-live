<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — Thowdan Al-Eryani</title>
  <meta name="description" content="The page you're looking for doesn't exist or was moved.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#F5F5F7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0A0B0F" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    (function () {
      try {
        var s = localStorage.getItem('pf-theme');
        var d = s ? s === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
</head>
<body>
  <div class="bg-base" aria-hidden="true"></div>
  <div class="glow-field" aria-hidden="true">
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
  </div>

  <div class="error-shell">
    <header class="error-header">
      <a class="brand" href="/">
        <span class="logo">TA</span>
        <span class="brand-name">Thowdan Al-Eryani</span>
      </a>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon icon-moon" aria-hidden="true"></i>
        <i class="fa-solid fa-sun icon-sun" aria-hidden="true"></i>
      </button>
    </header>

    <main class="error-main">
      <div class="error-card">
        <div class="error-card-glow" aria-hidden="true"></div>
        <div class="error-inner">
          <div class="error-code">404</div>
          <h1 class="error-title">Page not found</h1>
          <p class="error-msg">The page you're looking for doesn't exist, was moved, or the link is broken.</p>
          <div class="error-actions">
            <a class="btn btn-accent" href="/">Back to home</a>
            <a class="btn btn-ghost" href="mailto:thowdan64@gmail.com?subject=Broken%20link%20on%20portfolio">Report a broken link</a>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">© <span data-year>2026</span> Thowdan Al-Eryani</footer>
  </div>

  <script src="/js/theme.js" defer></script>
</body>
</html>
